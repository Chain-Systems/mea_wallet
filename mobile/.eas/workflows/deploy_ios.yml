name: Deploy iOS

on:
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS Production
    type: build
    environment: production
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit iOS to App Store
    type: submit
    needs: [build_ios]
    environment: production
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  notify_slack:
    name: Notify Slack
    after: [build_ios, submit_ios]
    environment: production
    steps:
      - uses: eas/send_slack_message
        with:
          message: |
            iOS production deploy finished.
            Workflow: ${{ workflow.name }}
            Build status: ${{ after.build_ios.status }}
            Submit status: ${{ after.submit_ios.status }}
            Build URL: https://expo.dev/builds/${{ after.build_ios.outputs.build_id }}
            Workflow URL: ${{ workflow.url }}
