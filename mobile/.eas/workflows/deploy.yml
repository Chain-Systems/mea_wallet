name: Deploy

on:
  workflow_dispatch: {}

jobs:
  build_android:
    name: Build Android Production
    type: build
    environment: production
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS Production
    type: build
    environment: production
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android to Play Store
    type: submit
    needs: [build_android]
    environment: production
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit iOS to App Store
    type: submit
    needs: [build_ios]
    environment: production
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  notify_slack:
    name: Notify Slack
    after: [build_android, build_ios, submit_android, submit_ios]
    environment: production
    steps:
      - uses: eas/send_slack_message
        with:
          message: |
            Production deploy finished.
            Workflow: ${{ workflow.name }}
            Android build: ${{ after.build_android.status }}
            Android submit: ${{ after.submit_android.status }}
            Android build URL: https://expo.dev/builds/${{ after.build_android.outputs.build_id }}
            iOS build: ${{ after.build_ios.status }}
            iOS submit: ${{ after.submit_ios.status }}
            iOS build URL: https://expo.dev/builds/${{ after.build_ios.outputs.build_id }}
            Workflow URL: ${{ workflow.url }}
